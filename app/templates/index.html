{% extends 'base.html' %}

{% block content %}
    <form action="/" method="POST">
        <input type="text" name="search" placeholder="Enter a search term" required>
        <button type="submit">Search</button>
    </form>

    {% if results %}
        <div class="results">
            <h2>Search Results</h2>
            <h3>Quran</h3>
            <ul>
                {% for verse in results['quran'] %}
                    <li>{{ verse }}</li>
                {% endfor %}
            </ul>

            <h3>Hadith</h3>
            <ul>
                {% for hadith in results['hadith'] %}
                    <li>{{ hadith }}</li>
                {% endfor %}
            </ul>
        </div>
    {% endif %}
{% endblock %}
